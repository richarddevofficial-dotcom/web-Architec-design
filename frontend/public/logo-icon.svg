<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  
  <!-- Grid -->
  <line x1="0" y1="100" x2="200" y2="100" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="200" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
  
  <!-- Building -->
  <g opacity="0.1" fill="white">
    <polygon points="100,45 40,110 160,110"/>
    <rect x="55" y="110" width="90" height="60"/>
    <rect x="75" y="130" width="20" height="40"/>
    <rect x="105" y="130" width="20" height="40"/>
  </g>
  
  <!-- MA -->
  <text x="100" y="130" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="80" font-weight="bold" letter-spacing="-4">MA</text>
  
  <!-- Gold Dot -->
  <circle cx="170" cy="170" r="10" fill="#fbbf24"/>
</svg>