<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c23152"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.8)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  
  <!-- Decorative lines -->
  <rect x="0" y="0" width="200" height="4" fill="url(#line)"/>
  <rect x="196" y="0" width="4" height="200" fill="url(#line)" opacity="0.5"/>
  
  <!-- Building icon -->
  <g transform="translate(100,85)" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
    <rect x="-35" y="-20" width="70" height="70" rx="4"/>
    <line x1="-35" y1="0" x2="35" y2="0"/>
    <line x1="-20" y1="0" x2="-20" y2="-20"/>
    <line x1="0" y1="0" x2="0" y2="-20"/>
    <line x1="20" y1="0" x2="20" y2="-20"/>
    <rect x="-10" y="15" width="20" height="35"/>
  </g>
  
  <!-- Main Letter E -->
  <text x="100" y="145" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="100" font-weight="bold">
    E
  </text>
  
  <!-- Small accent dot -->
  <circle cx="165" cy="170" r="8" fill="#fbbf24"/>
</svg>