<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <defs>
    <linearGradient id="monogramBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Monogram Box -->
  <rect x="0" y="10" width="100" height="100" rx="20" fill="url(#monogramBg)"/>
  
  <!-- Grid Lines -->
  <line x1="0" y1="60" x2="100" y2="60" stroke="white" stroke-opacity="0.1" stroke-width="0.5"/>
  <line x1="50" y1="10" x2="50" y2="110" stroke="white" stroke-opacity="0.1" stroke-width="0.5"/>
  
  <!-- Building Silhouette -->
  <g opacity="0.08" fill="white">
    <polygon points="50,30 20,65 80,65"/>
    <rect x="30" y="65" width="40" height="30"/>
  </g>
  
  <!-- MA Text -->
  <text x="50" y="75" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="48" font-weight="bold" letter-spacing="-2">MA</text>
  
  <!-- Gold Dot -->
  <circle cx="85" cy="95" r="5" fill="#fbbf24"/>
  
  <!-- Company Name -->
  <text x="120" y="55" fill="#1a1a2e" font-family="Georgia, serif" font-size="32" font-weight="bold" letter-spacing="-0.5">Manuella</text>
  <text x="120" y="78" fill="#6b7280" font-family="Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3">ARCHITECTS</text>
  
  <!-- Tagline -->
  <text x="120" y="100" fill="#9ca3af" font-family="Arial, sans-serif" font-size="11" letter-spacing="1.5">ARCHITECTURE • INTERIOR • PLANNING</text>
</svg>