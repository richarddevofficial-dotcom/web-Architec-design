<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  
  <!-- Grid lines -->
  <line x1="0" y1="32" x2="64" y2="32" stroke="white" stroke-opacity="0.1" stroke-width="0.5"/>
  <line x1="32" y1="0" x2="32" y2="64" stroke="white" stroke-opacity="0.1" stroke-width="0.5"/>
  
  <!-- Building silhouette -->
  <g opacity="0.15" fill="white">
    <polygon points="32,12 12,36 52,36"/>
    <rect x="18" y="36" width="28" height="18"/>
  </g>
  
  <!-- MA -->
  <text x="32" y="44" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="26" font-weight="bold" letter-spacing="-1">MA</text>
  
  <!-- Gold dot -->
  <circle cx="54" cy="54" r="3" fill="#fbbf24"/>
</svg>